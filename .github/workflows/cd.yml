name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests antes de deploy
        run: npm test

      - name: Deploy a Render
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.DEPLOY_KEY }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            | grep -q '"id"' && echo "Deploy iniciado exitosamente" || echo "Error en deploy"
